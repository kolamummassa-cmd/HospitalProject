{% extends 'base.html' %}
{% block title %}{{ action }} Patient - HMS{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="fas fa-users"></i> {{ action }} Patient</h1>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <h5 class="mb-3">Personal Information</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name *</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" value="{{ patient.first_name|default:'' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name *</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" value="{{ patient.last_name|default:'' }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="date_of_birth" class="form-label">Date of Birth *</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ patient.date_of_birth|date:'Y-m-d'|default:'' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="gender" class="form-label">Gender *</label>
                            <select class="form-select" id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male" {% if patient.gender == 'male' %}selected{% endif %}>Male</option>
                                <option value="female" {% if patient.gender == 'female' %}selected{% endif %}>Female</option>
                                <option value="other" {% if patient.gender == 'other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <h5 class="mb-3 mt-4">Contact Information</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="contact" class="form-label">Phone *</label>
                            <input type="tel" class="form-control" id="contact" name="contact" value="{{ patient.contact|default:'' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ patient.email|default:'' }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Address *</label>
                        <textarea class="form-control" id="address" name="address" rows="2" required>{{ patient.address|default:'' }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="city" class="form-label">City *</label>
                            <input type="text" class="form-control" id="city" name="city" value="{{ patient.city|default:'' }}" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="state" class="form-label">State *</label>
                            <input type="text" class="form-control" id="state" name="state" value="{{ patient.state|default:'' }}" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="zip_code" class="form-label">Zip Code *</label>
                            <input type="text" class="form-control" id="zip_code" name="zip_code" value="{{ patient.zip_code|default:'' }}" required>
                        </div>
                    </div>
                    
                    <h5 class="mb-3 mt-4">Medical Information</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="blood_type" class="form-label">Blood Type</label>
                            <select class="form-select" id="blood_type" name="blood_type">
                                <option value="">Select Blood Type</option>
                                <option value="O+" {% if patient.blood_type == 'O+' %}selected{% endif %}>O+</option>
                                <option value="O-" {% if patient.blood_type == 'O-' %}selected{% endif %}>O-</option>
                                <option value="A+" {% if patient.blood_type == 'A+' %}selected{% endif %}>A+</option>
                                <option value="A-" {% if patient.blood_type == 'A-' %}selected{% endif %}>A-</option>
                                <option value="B+" {% if patient.blood_type == 'B+' %}selected{% endif %}>B+</option>
                                <option value="B-" {% if patient.blood_type == 'B-' %}selected{% endif %}>B-</option>
                                <option value="AB+" {% if patient.blood_type == 'AB+' %}selected{% endif %}>AB+</option>
                                <option value="AB-" {% if patient.blood_type == 'AB-' %}selected{% endif %}>AB-</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="emergency_contact" class="form-label">Emergency Contact</label>
                            <input type="tel" class="form-control" id="emergency_contact" name="emergency_contact" value="{{ patient.emergency_contact|default:'' }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="emergency_contact_name" class="form-label">Emergency Contact Name</label>
                        <input type="text" class="form-control" id="emergency_contact_name" name="emergency_contact_name" value="{{ patient.emergency_contact_name|default:'' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="medical_history" class="form-label">Medical History</label>
                        <textarea class="form-control" id="medical_history" name="medical_history" rows="3">{{ patient.medical_history|default:'' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="allergies" class="form-label">Allergies</label>
                        <textarea class="form-control" id="allergies" name="allergies" rows="3">{{ patient.allergies|default:'' }}</textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save
                        </button>
                        <a href="{% url 'patients:patient_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
